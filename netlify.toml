[build]
  command   = "bun run build"
  publish   = "public"

[build.environment]
  HUGO_VERSION = "0.145.0"
  NODE_VERSION = "20"
  BUN_VERSION  = "1.3.3"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from   = "/"
  to     = "/en/"
  status = 302
